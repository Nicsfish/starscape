<!DOCTYPE html>
<html>
    <head>
        <title>Starscape Database</title>
    </head>
    <body>

        <canvas id="canvas" style="background-color: #000;">

        </canvas>
        <script>
            fetch("./data/map.json")
                .then((res) => {
                    if (!res.ok) {
                        throw new Error
                            (`Status: ${res.status}`);
                    }
                    return res.json();
                })
                .then((data) => 
                      console.log(data))
                .catch((error) => 
                       console.error("Unable to fetch data:", error));
        </script>
    </body>
</html
